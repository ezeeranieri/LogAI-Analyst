version: '3.8'

services:
  # Redis for distributed rate limiting
  redis:
    image: redis:7-alpine
    container_name: logai-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LogAI-Analyst API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: logai-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=8000
      - REDIS_URL=redis://redis:6379/0
      - WORKERS=4
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  redis_data:
